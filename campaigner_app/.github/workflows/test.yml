name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.4"
          rebar3-version: "3"
          # elixir-version: "1"
      - name: Cache Gleam packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/gleam
          key: ${{ runner.os }}-gleam-${{ hashFiles('gleam.toml') }}
          restore-keys: |
            ${{ runner.os }}-gleam-
      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-gleam-build-${{ hashFiles('gleam.toml') }}-${{ hashFiles('src/**/*.gleam', 'test/**/*.gleam') }}
          restore-keys: |
            ${{ runner.os }}-gleam-build-
      - run: gleam deps download
      - run: gleam build
      - run: gleam test
      - run: gleam format --check src test
