config:
  validation: true

build:
  maxIssues: 0
  weights:
    complexity: 2

complexity:
  LongMethod:
    active: true
    threshold: 80
  CyclomaticComplexMethod:
    active: true
    threshold: 20

naming:
  FunctionNaming:
    active: true
    ignoreAnnotated: ['Composable']

style:
  MaxLineLength:
    active: true
    maxLineLength: 120
  ReturnCount:
    active: true
    max: 3
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2']
    ignorePropertyDeclaration: true